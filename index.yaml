    <section class="hero">
      <div class="tag">OPSD-style Posterior Preference Distillation for Generative Recommendation</div>

      <h1>OneBar: End-to-End Content-Grounded Generative Query Recommendation</h1>

      <p>
        OneBar is an end-to-end generative framework for real-time query recommendation in e-commerce short-video feeds.
        It converts the bottom-bar query recommendation problem from candidate retrieval into direct generation from
        content-grounded evidence, while using preference-internalized on-policy distillation to align the generator with
        hierarchical behavior preferences.
      </p>

      <p class="authors">
        Yao Tang, Ying Yang, Ben Chen, Yufei Ma, Zihan Liang, Chenyi Lei, Wenwu Ou, Jian Liu
      </p>

      <div class="buttons">
        <a class="button primary" href="https://arxiv.org/abs/2606.15330">Paper</a>
        <a class="button" href="https://arxiv.org/pdf/2606.15330">PDF</a>
        <a class="button" href="#bibtex">BibTeX</a>
        <a class="button" href="#piopd">PIOPD / OPSD-style Distillation</a>
      </div>
    </section>

    <section>
      <h2>Why OneBar?</h2>
      <p>
        Short-video platforms expose clickable search entries beneath the video player, allowing users to express
        content-induced search intent. Existing industrial pipelines often rely on retrieval-based cascades, which are
        constrained by candidate pools, strict latency budgets, noisy content-side metadata, and fragmented objectives.
        OneBar instead uses a compact encoder-decoder generator to directly produce bottom-bar queries from structured
        multimodal and collaborative evidence.
      </p>
    </section>

    <section>
      <h2>Key Ideas</h2>
      <div class="grid">
        <div class="card">
          <strong>Collaborative-Multimodal Intent Grounding</strong>
          <p>
            OneBar fuses video understanding, textual metadata, behavior-derived query anchors, and user-side evidence
            to ground generation in both content semantics and collaborative search behavior.
          </p>
        </div>

        <div class="card">
          <strong>Unified Low-Latency Generation</strong>
          <p>
            A compact [SEP]-delimited evidence schema feeds an encoder-decoder generator, replacing fragmented
            retrieval, rewriting, filtering, and ranking stages with a unified serving path.
          </p>
        </div>

        <div class="card">
          <strong>PIOPD: OPSD-style Preference Internalization</strong>
          <p>
            Preference-Internalized On-Policy Distillation transfers posterior-aware teacher distributions to a
            trigger-only online student, helping the serving model internalize behavior preferences without a separate
            reward model.
          </p>
        </div>
      </div>
    </section>

    <section id="piopd">
      <h2>PIOPD and OPSD-style Distillation</h2>
      <p>
        PIOPD follows the central intuition of on-policy self-distillation: the student is trained on its own generated
        states, while a teacher with privileged posterior information provides dense token-level supervision over the
        same generation process. In OneBar, the teacher observes posterior behavior evidence, whereas the online student
        only uses trigger-side evidence available at serving time.
      </p>

      <p>
        This design makes PIOPD an OPSD-style extension for industrial generative recommendation rather than a generic
        reasoning-only distillation method. It adapts the on-policy distillation loop to query recommendation, where the
        goal is not just to imitate a text trajectory but to internalize hierarchical behavior preferences into a
        low-latency generation policy.
      </p>
    </section>

    <section>
      <h2>Method Overview</h2>
      <div class="figure">
        <div class="placeholder">
          Add method figure here: assets/overview.png
        </div>
      </div>

      <h3>Three-stage preference learning</h3>
      <div class="grid">
        <div class="card">
          <strong>Stage I: Content-Grounded SFT</strong>
          <p>
            Supervised fine-tuning on clean trigger-query pairs anchors the generator in natural query language and
            content relevance.
          </p>
        </div>

        <div class="card">
          <strong>Stage II: List-wise Preference Alignment</strong>
          <p>
            Hierarchical behavior signals align the generator with different levels of user engagement and collaborative
            preference.
          </p>
        </div>

        <div class="card">
          <strong>Stage III: PIOPD</strong>
          <p>
            Posterior-informed on-policy distillation transfers dense teacher distributions to the online trigger-only
            student using stabilized KL objectives.
          </p>
        </div>
      </div>
    </section>

    <section>
      <h2>Results</h2>
      <p>
        In online A/B testing, OneBar increases query exposure, query clicks, guided orders, and guided GMV while
        maintaining query CTR. These results suggest that end-to-end generation can unlock additional search demand in
        short-video e-commerce scenarios.
      </p>
    </section>

    <section>
      <h2>FAQ</h2>

      <h3>Is PIOPD the same as OPSD?</h3>
      <p>
        PIOPD is not a generic reimplementation of reasoning-oriented OPSD. It is an OPSD-style posterior preference
        distillation strategy designed for generative query recommendation, where the teacher has posterior behavior
        evidence and the student must serve under trigger-only online constraints.
      </p>

      <h3>Why does on-policy distillation help query recommendation?</h3>
      <p>
        Query generation is sensitive to exposure bias: the model must rank and preserve plausible query variants under
        its own beam-search distribution. On-policy distillation supervises the student on its own generated states,
        helping it internalize behavior-preferred alternatives rather than only fitting offline target queries.
      </p>

      <h3>How is this different from retrieval-based query recommendation?</h3>
      <p>
        Retrieval-based systems are bounded by candidate pools and often require fragmented downstream modules.
        OneBar directly generates queries from content-grounded evidence, enabling fresher and more fine-grained query
        recommendations under low-latency serving constraints.
      </p>
    </section>

